# DGX Spark 다중 사용자 dev/finetune 스택 — host.docker.internal 경유로 호스트의 ollama/whisper API 호출
name: devstack

volumes:
  dev-uv-cache: {}
  dev-pnpm-store: {}
  dev-vscode-server: {}
  dev-sshd-keys: {}
  ft-hf-cache: {}

services:
  dev:
    build:
      context: ./dev
      args:
        USERNAME: ${USERNAME:-dev}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        DOCKER_GID: ${DOCKER_GID:-988}
    image: devstack-dev:${USERNAME:-dev}
    container_name: ${USERNAME:-dev}-dev
    hostname: dev
    init: true
    extra_hosts:
      # rootless 컨테이너는 호스트 docker0(host-gateway) 로 라우팅 못 함 (자체 bridge 사용).
      # Tailscale 자기 IP 는 호스트 자기 자신에서도 로컬 라우팅되므로 rootful/rootless 양쪽에서 동작.
      - "host.docker.internal:${TAILSCALE_IP}"
    ports:
      # SSH는 Tailscale IP에만 publish. 호스트 자기 자신에서도 ssh -p PORT user@${TAILSCALE_IP}로 접속 가능
      # (Tailscale이 자기 IP는 로컬 라우팅함). rootless docker는 같은 host port를 두 IP에 동시
      # publish 못하는 limitation이 있어 dual-binding을 피함.
      - "${TAILSCALE_IP:?TAILSCALE_IP must be set in .env}:${SSH_PORT_TS:-${SSH_PORT_LOCAL:-2222}}:22"
      # LAN까지 허용하려면 .env의 LAN_IP를 풀고 아래 한 줄 주석 해제. 단, rootless dockerd는
      # ${TAILSCALE_IP}와 ${LAN_IP}가 같은 포트면 이 줄도 충돌하므로 다른 포트를 쓰거나 한쪽만 사용.
      # - "${LAN_IP}:${SSH_PORT_LAN:-2223}:22"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_BASE=http://host.docker.internal:11434/v1
      - OPENAI_API_KEY=ollama
      - WHISPER_BASE_URL=http://host.docker.internal:8000/v1
    volumes:
      # 워크스페이스만 격리 마운트. ~/Projects의 다른 폴더(공유 인프라)는 컨테이너에 안 보임.
      # 호스트 경로 = 컨테이너 경로 일치 → 도구 출력의 경로 문자열이 어디서 봐도 동일.
      - ${HOME}/Projects/dev-workspace:/home/${USERNAME:-dev}/Projects/dev-workspace
      - ${HOME}/.ssh/authorized_keys:/home/${USERNAME:-dev}/.ssh/authorized_keys:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - dev-uv-cache:/home/${USERNAME:-dev}/.cache/uv
      - dev-pnpm-store:/home/${USERNAME:-dev}/.local/share/pnpm
      - dev-vscode-server:/home/${USERNAME:-dev}/.vscode-server
      - dev-sshd-keys:/etc/ssh/keys
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn 2>/dev/null | grep -q ':22 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  finetune:
    build:
      context: ./finetune
      args:
        USERNAME: ${USERNAME:-dev}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: devstack-finetune:${USERNAME:-dev}
    container_name: ${USERNAME:-dev}-finetune
    runtime: nvidia
    # NVIDIA 권장. 큰 모델 학습 시 SHM/ulimit 여유 필요.
    ipc: host
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864
    extra_hosts:
      # dev 와 동일 이유로 Tailscale 자기 IP 로 매핑 (rootless 호환).
      - "host.docker.internal:${TAILSCALE_IP}"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/home/${USERNAME:-dev}/.cache/huggingface
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ${HOME}/Projects/dev-workspace:/home/${USERNAME:-dev}/Projects/dev-workspace
      - ft-hf-cache:/home/${USERNAME:-dev}/.cache/huggingface
    profiles: ["ft"]
    command: ["sleep", "infinity"]
    restart: "no"
